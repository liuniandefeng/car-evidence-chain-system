<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    /* Primitive palette — warm, cat-inspired */
    --yellow-50:  oklch(97% 0.04 85);
    --yellow-100: oklch(93% 0.08 82);
    --yellow-200: oklch(88% 0.12 78);
    --yellow-400: oklch(78% 0.18 72);
    --yellow-500: oklch(70% 0.2  68);
    --orange-300: oklch(72% 0.18 50);
    --orange-500: oklch(58% 0.22 45);
    --pink-300:   oklch(78% 0.12 10);
    --pink-400:   oklch(72% 0.14 8);

    /* Warm-tinted neutrals — never pure gray */
    --warm-50:  oklch(98% 0.008 80);
    --warm-100: oklch(95% 0.010 78);
    --warm-200: oklch(90% 0.012 75);
    --warm-300: oklch(80% 0.014 72);
    --warm-500: oklch(55% 0.012 68);
    --warm-700: oklch(35% 0.010 65);
    --warm-900: oklch(18% 0.008 60);

    /* Semantic tokens */
    --color-bg:      var(--warm-50);
    --color-surface: oklch(100% 0 0);
    --color-text:    var(--warm-900);
    --color-text-muted: var(--warm-500);
    --color-primary: var(--orange-500);
    --color-primary-hover: var(--orange-300);
    --color-accent:  var(--yellow-400);
    --color-input-bg:    var(--warm-100);
    --color-input-border: var(--warm-200);
    --color-input-focus:  var(--yellow-400);
    --color-error:   oklch(55% 0.18 20);

    /* Spacing — 4pt base */
    --space-1:  0.25rem;
    --space-2:  0.5rem;
    --space-3:  0.75rem;
    --space-4:  1rem;
    --space-6:  1.5rem;
    --space-8:  2rem;
    --space-10: 2.5rem;
    --space-12: 3rem;
    --space-16: 4rem;
    --space-20: 5rem;

    /* Typography */
    --font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    --text-xs:   0.75rem;
    --text-sm:   0.875rem;
    --text-base: 1rem;
    --text-lg:   1.25rem;
    --text-xl:   1.75rem;
    --text-2xl:  2.25rem;
    --text-3xl:  3rem;

    --leading-tight:  1.15;
    --leading-normal: 1.6;

    --radius-sm: 0.5rem;
    --radius-md: 0.75rem;
    --radius-lg: 1rem;
    --radius-xl: 1.5rem;
    --radius-full: 9999px;

    --shadow-sm: 0 1px 2px oklch(18% 0.008 60 / 0.06);
    --shadow-md: 0 4px 16px oklch(18% 0.008 60 / 0.10);
    --shadow-lg: 0 12px 40px oklch(18% 0.008 60 / 0.14);

    --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  }

  html { height: 100%; }

  body {
    height: 100%;
    font-family: var(--font-family);
    font-size: var(--text-base);
    line-height: var(--leading-normal);
    color: var(--color-text);
    background: var(--color-bg);
    display: grid;
    place-items: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .login-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: min(960px, 94vw);
    min-height: 560px;
    background: var(--color-surface);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  /* ============================================
     LEFT — Cat Illustration Panel
     ============================================ */
  .illustration-panel {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(
      160deg,
      oklch(93% 0.06 20) 0%,
      oklch(88% 0.10 15) 40%,
      oklch(84% 0.12 10) 100%
    );
    padding: var(--space-12) var(--space-8) var(--space-6);
    overflow: hidden;
  }

  /* Decorative soft blobs */
  .illustration-panel::before {
    content: '';
    position: absolute;
    top: -30%;
    right: -20%;
    width: 320px;
    height: 320px;
    background: oklch(90% 0.07 25 / 0.35);
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
  }

  .illustration-panel::after {
    content: '';
    position: absolute;
    bottom: -15%;
    left: -10%;
    width: 240px;
    height: 240px;
    background: oklch(83% 0.09 15 / 0.3);
    border-radius: 50%;
    filter: blur(50px);
    pointer-events: none;
  }

  .cat-wrapper {
    position: relative;
    z-index: 1;
    animation: cat-float 3s var(--ease-out-expo) infinite alternate;
  }

  @keyframes cat-float {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-8px); }
  }

  .cat-svg {
    width: 330px;
    height: auto;
    filter: drop-shadow(0 8px 24px oklch(60% 0.15 40 / 0.18));
  }

  /* Neck — bridges body and head; stretches when peeking */
  #cat-neck {
    transition: height 0.45s var(--ease-out-expo),
                y    0.45s var(--ease-out-expo);
  }

  /* Head group — moves when peeking */
  #cat-head {
    transform-origin: 155px 175px;
    transition: transform 0.45s var(--ease-out-expo);
  }

  /* Peeking state */
  .illustration-panel.peeking #cat-neck {
    height: 32px;
    y: 108px;
  }

  .illustration-panel.peeking #cat-head {
    transform: translate(12px, -10px);
  }

  /* Mouth surprise transition */
  .char-mouth {
    transition: opacity 0.3s var(--ease-out-quart);
  }
  .surprise-mouth {
    opacity: 0;
    transition: opacity 0.3s var(--ease-out-quart);
  }
  .illustration-panel.peeking .char-mouth {
    opacity: 0;
  }
  .illustration-panel.peeking .surprise-mouth {
    opacity: 1;
  }

  .illustration-text {
    position: absolute;
    top: var(--space-6);
    left: var(--space-8);
    z-index: 1;
    display: flex;
    align-items: center;
    gap: var(--space-3);
    text-align: left;
  }

  .illustration-text img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .illustration-text h2 {
    font-size: var(--text-lg);
    font-weight: 800;
    color: var(--warm-700);
    line-height: var(--leading-tight);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  /* ============================================
     RIGHT — Login Form Panel
     ============================================ */
  .form-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: var(--space-16) var(--space-12);
    background: var(--color-surface);
  }

  .form-header {
    margin-bottom: var(--space-8);
  }

  .form-header h1 {
    font-size: var(--text-2xl);
    font-weight: 800;
    color: var(--warm-900);
    line-height: var(--leading-tight);
    letter-spacing: -0.02em;
  }

  .form-header p {
    margin-top: var(--space-2);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    font-weight: 500;
  }

  .form-group {
    margin-bottom: var(--space-6);
  }

  .form-group label {
    display: block;
    margin-bottom: var(--space-2);
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--warm-700);
    letter-spacing: 0.01em;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: var(--space-4);
    width: 20px;
    height: 20px;
    color: var(--color-text-muted);
    pointer-events: none;
    transition: color 0.25s var(--ease-out-quart);
  }

  .form-group input {
    width: 100%;
    padding: var(--space-3) var(--space-4) var(--space-3) 2.75rem;
    font-family: var(--font-family);
    font-size: var(--text-base);
    font-weight: 500;
    color: var(--warm-900);
    background: var(--color-input-bg);
    border: 2px solid var(--color-input-border);
    border-radius: var(--radius-md);
    outline: none;
    transition:
      border-color 0.25s var(--ease-out-quart),
      box-shadow 0.25s var(--ease-out-quart),
      background 0.25s var(--ease-out-quart);
  }

  .form-group input:focus {
    border-color: var(--color-input-focus);
    background: var(--color-surface);
    box-shadow: 0 0 0 4px oklch(78% 0.18 72 / 0.18);
  }

  .form-group input:focus ~ .input-icon,
  .form-group input:focus + .input-icon {
    color: var(--yellow-500);
  }

  .form-group input::placeholder {
    color: var(--warm-300);
    font-weight: 400;
    opacity: 1;
  }

  .form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-8);
    font-size: var(--text-sm);
  }

  .remember-me {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    cursor: pointer;
    user-select: none;
  }

  .remember-me input[type="checkbox"] {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid var(--color-input-border);
    border-radius: 4px;
    background: var(--color-input-bg);
    cursor: pointer;
    position: relative;
    transition: all 0.2s var(--ease-out-quart);
    flex-shrink: 0;
  }

  .remember-me input[type="checkbox"]:checked {
    background: var(--color-primary);
    border-color: var(--color-primary);
  }

  .remember-me input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 6px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .remember-me span {
    font-weight: 500;
    color: var(--warm-500);
  }

  .forgot-link {
    font-weight: 700;
    color: var(--color-primary);
    text-decoration: none;
    transition: color 0.2s var(--ease-out-quart);
  }

  .forgot-link:hover { color: var(--orange-300); }

  .btn-login {
    width: 100%;
    padding: var(--space-3) var(--space-6);
    font-family: var(--font-family);
    font-size: var(--text-base);
    font-weight: 800;
    color: #fff;
    background: var(--color-primary);
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition:
      background 0.25s var(--ease-out-quart),
      transform 0.15s var(--ease-out-quart),
      box-shadow 0.25s var(--ease-out-quart);
    box-shadow: var(--shadow-sm);
  }

  .btn-login:hover {
    background: var(--orange-300);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .btn-login:active {
    transform: translateY(0) scale(0.985);
    transition: transform 0.08s var(--ease-out-quart);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin: var(--space-8) 0;
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--color-input-border);
  }

  .social-login {
    display: flex;
    justify-content: center;
    gap: var(--space-4);
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 2px solid var(--color-input-border);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    cursor: pointer;
    transition:
      border-color 0.25s var(--ease-out-quart),
      box-shadow 0.25s var(--ease-out-quart),
      transform 0.15s var(--ease-out-quart);
  }

  .social-btn:hover {
    border-color: var(--yellow-400);
    box-shadow: 0 0 0 4px oklch(78% 0.18 72 / 0.12);
    transform: translateY(-2px);
  }

  .social-btn svg {
    width: 20px;
    height: 20px;
  }

  .signup-prompt {
    margin-top: var(--space-8);
    text-align: center;
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--color-text-muted);
  }

  .signup-prompt a {
    font-weight: 700;
    color: var(--color-primary);
    text-decoration: none;
    margin-left: var(--space-1);
  }

  .signup-prompt a:hover { color: var(--orange-300); }

  .login-error {
    background: oklch(95% 0.04 20);
    color: oklch(45% 0.18 20);
    border: 1px solid oklch(85% 0.10 20);
    border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-3);
    margin-bottom: var(--space-4);
    font-size: var(--text-sm);
    font-weight: 600;
    text-align: center;
    animation: shake 0.4s var(--ease-out-quart);
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 720px) {
    .login-container {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      width: 100%;
      min-height: 100dvh;
      border-radius: 0;
    }

    .illustration-panel {
      padding: var(--space-10) var(--space-6);
    }

    .cat-svg { width: 240px; }

    .illustration-text img { width: 36px; height: 36px; }
    .illustration-text h2 { font-size: var(--text-sm); }

    .form-panel {
      padding: var(--space-8) var(--space-6);
      justify-content: flex-start;
    }

    .form-header h1 { font-size: var(--text-xl); }
  }
</style>
</head>
<body>

<div class="login-container">

  <!-- ========== LEFT: Cat illustration ========== -->
  <section class="illustration-panel">
    <div class="cat-wrapper">
      <svg class="cat-svg" viewBox="-90 0 360 270" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ===== Three geometric characters (left, feet-aligned with cat) ===== -->
        <g id="geometric-characters">
          <!-- Orange rounded-triangle character -->
          <path d="M-104 248 Q-100 228 -92 210 Q-65 172 -38 210 Q-30 228 -26 248 Z" fill="#F59E0B" />
          <!-- eyes — large white ovals -->
          <ellipse cx="-73" cy="206.5" rx="5" ry="5.5" fill="#FFF" />
          <ellipse cx="-57" cy="206.5" rx="5" ry="5.5" fill="#FFF" />
          <!-- pupils -->
          <g id="orange-left-pupil"><circle cx="-73" cy="208" r="2.8" fill="#1A1A2E" /></g>
          <g id="orange-right-pupil"><circle cx="-57" cy="208" r="2.8" fill="#1A1A2E" /></g>
          <!-- mouth — flat straight line -->
          <line id="orange-mouth" class="char-mouth" x1="-75" y1="219" x2="-55" y2="219" stroke="#B45309" stroke-width="2.2" stroke-linecap="round" />
          <!-- surprise mouth — round "O" -->
          <circle id="orange-surprise" class="surprise-mouth" cx="-65" cy="219" r="5.5" stroke="#B45309" stroke-width="2.2" fill="none" />

          <!-- ◆ Purple tall rectangle character (center, tallest) — rounded top -->
          <path d="M-42 248 L-42 180 Q-42 155 -30 155 Q-18 155 -18 180 L-18 248 Z" fill="#7C3AED" />
          <!-- eyes — white ovals -->
          <ellipse cx="-36" cy="175" rx="3.8" ry="4" fill="#FFF" />
          <ellipse cx="-24" cy="175" rx="3.8" ry="4" fill="#FFF" />
          <!-- pupils -->
          <g id="purple-left-pupil"><circle cx="-36" cy="176.5" r="2.2" fill="#1A1A2E" /></g>
          <g id="purple-right-pupil"><circle cx="-24" cy="176.5" r="2.2" fill="#1A1A2E" /></g>
          <!-- mouth — gentle smile -->
          <path id="purple-mouth" class="char-mouth" d="M-33 190 Q-30 195 -27 190" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" fill="none" />
          <!-- surprise mouth — round "O" -->
          <circle id="purple-surprise" class="surprise-mouth" cx="-30" cy="192" r="4" stroke="#C4B5FD" stroke-width="2" fill="none" />

          <!-- ■ Black short wide character (rightmost, 3rd tallest) — rectangle -->
          <rect x="-14" y="200" width="22" height="48" rx="4" fill="#1E1E2E" />
          <!-- eyes — wide open white circles -->
          <circle cx="-6" cy="213" r="3.2" fill="#FFF" />
          <circle cx="3" cy="213" r="3.2" fill="#FFF" />
          <!-- pupils -->
          <g id="black-left-pupil"><circle cx="-6" cy="214" r="1.8" fill="#1A1A2E" /></g>
          <g id="black-right-pupil"><circle cx="3" cy="214" r="1.8" fill="#1A1A2E" /></g>
          <!-- mouth — flat line -->
          <line id="black-mouth" class="char-mouth" x1="-6" y1="220" x2="3" y2="220" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
          <!-- surprise mouth — round "O" -->
          <circle id="black-surprise" class="surprise-mouth" cx="-1.5" cy="220" r="3.5" stroke="#555" stroke-width="1.8" fill="none" />
        </g>

        <!-- Body — rounded body -->
        <ellipse cx="155" cy="202" rx="82" ry="64" fill="#FAD75E" />

        <!-- Neck -->
        <rect id="cat-neck" x="141" y="120" width="28" height="18" rx="5" fill="#EED055" />

        <!-- Head group -->
        <g id="cat-head">
          <!-- Head top highlight -->
          <ellipse cx="155" cy="140" rx="45" ry="18" fill="#FDE68A" opacity="0.35" />

          <!-- Left ear — outer yellow triangle -->
          <polygon points="73,145 90,58 130,118" fill="#F5C842" />
          <!-- Left ear — inner orange triangle -->
          <polygon points="83,140 96,78 123,120" fill="#F08C3C" />
          <!-- Left ear — connecting arc -->
          <path d="M73,145 Q77,142 81,140" stroke="#D4C9A8" stroke-width="2" stroke-linecap="round" fill="none" />

          <!-- Right ear — outer yellow triangle -->
          <polygon points="237,145 220,58 180,118" fill="#F5C842" />
          <!-- Right ear — inner orange triangle -->
          <polygon points="227,140 214,78 187,120" fill="#F08C3C" />
          <!-- Right ear — connecting arc -->
          <path d="M237,145 Q233,142 229,140" stroke="#D4C9A8" stroke-width="2" stroke-linecap="round" fill="none" />

          <!-- Left eye — white sclera -->
          <ellipse cx="127" cy="162" rx="17" ry="18" fill="#FFFEF9" />
          <!-- Left eye — pupil + highlight group -->
          <g id="left-eye-pupil">
            <ellipse cx="127" cy="162" rx="8" ry="9" fill="#2E2418" />
            <ellipse cx="130" cy="157" rx="3" ry="3.5" fill="#FFF" />
          </g>

          <!-- Right eye — white sclera -->
          <ellipse cx="183" cy="162" rx="17" ry="18" fill="#FFFEF9" />
          <!-- Right eye — pupil + highlight group -->
          <g id="right-eye-pupil">
            <ellipse cx="183" cy="162" rx="8" ry="9" fill="#2E2418" />
            <ellipse cx="186" cy="157" rx="3" ry="3.5" fill="#FFF" />
          </g>

          <!-- Nose — soft pink triangle -->
          <path d="M151 188 L155 183 L159 188 Z" fill="#F0A8B0" />

          <!-- Mouth — cute "w" shape -->
          <path d="M143 196 Q147 204 151 196" stroke="#6B5E4A" stroke-width="2" stroke-linecap="round" fill="none" />
          <path d="M151 196 L155 200 L159 196" stroke="#6B5E4A" stroke-width="2" stroke-linecap="round" fill="none" stroke-linejoin="round" />
          <path d="M159 196 Q163 204 167 196" stroke="#6B5E4A" stroke-width="2" stroke-linecap="round" fill="none" />

          <!-- Blush — left -->
          <ellipse cx="107" cy="178" rx="14" ry="9" fill="#F7CFC0" opacity="0.55" />
          <!-- Blush — right -->
          <ellipse cx="203" cy="178" rx="14" ry="9" fill="#F7CFC0" opacity="0.55" />
        </g>

        <!-- Whiskers — left -->
        <line x1="63" y1="170" x2="103" y2="178" stroke="#C8B896" stroke-width="1.6" stroke-linecap="round" opacity="0.7" />
        <line x1="61" y1="184" x2="101" y2="184" stroke="#C8B896" stroke-width="1.6" stroke-linecap="round" opacity="0.7" />
        <line x1="63" y1="198" x2="103" y2="190" stroke="#C8B896" stroke-width="1.6" stroke-linecap="round" opacity="0.7" />

        <!-- Whiskers — right -->
        <line x1="247" y1="170" x2="207" y2="178" stroke="#C8B896" stroke-width="1.6" stroke-linecap="round" opacity="0.7" />
        <line x1="249" y1="184" x2="209" y2="184" stroke="#C8B896" stroke-width="1.6" stroke-linecap="round" opacity="0.7" />
        <line x1="247" y1="198" x2="207" y2="190" stroke="#C8B896" stroke-width="1.6" stroke-linecap="round" opacity="0.7" />

        <!-- Paws -->
        <ellipse cx="123" cy="248" rx="20" ry="15" fill="#F5C842" transform="rotate(-6, 123, 248)" />
        <ellipse cx="187" cy="248" rx="20" ry="15" fill="#F5C842" transform="rotate(6, 187, 248)" />

        <!-- Paw pads -->
        <ellipse cx="118" cy="250" rx="4.5" ry="3.5" fill="#E6B649" transform="rotate(-6, 118, 250)" />
        <ellipse cx="128" cy="250" rx="4.5" ry="3.5" fill="#E6B649" transform="rotate(-6, 128, 250)" />
        <ellipse cx="182" cy="250" rx="4.5" ry="3.5" fill="#E6B649" transform="rotate(6, 182, 250)" />
        <ellipse cx="192" cy="250" rx="4.5" ry="3.5" fill="#E6B649" transform="rotate(6, 192, 250)" />

    <div class="illustration-text">
      <img src="logo.png" alt="壹直购">

  </section>

  <!-- ========== RIGHT: Login form ========== -->
  <section class="form-panel">
    <div class="form-header">
      <h1>登录账户</h1>
      <p>输入你的信息以继续</p>
    </div>

    <form id="login-form" autocomplete="on" novalidate>
      <div class="form-group">
        <label for="username">用户名</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          <span>记住我</span>
        </label>
        <a href="#" class="forgot-link">忘记密码？</a>
      </div>

      <button type="submit" class="btn-login">登 录</button>
    </form>

    <div class="divider">或通过以下方式登录</div>

    <div class="social-login">
      <!-- WeChat -->
      <button class="social-btn" title="微信登录" aria-label="微信登录">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M8.691 2.188C3.891 2.188 0 5.582 0 9.77c0 2.249 1.097 4.265 2.82 5.614l-.705 2.115 2.438-1.22c.994.44 2.092.69 3.254.696.01 0 .02-.003.033-.004.262.023.527.035.794.035C13.44 17.006 17.5 13.625 17.5 9.5S13.44 2 8.634 2l.057.188Zm-.195 4.4c.603 0 1.091.488 1.091 1.09 0 .602-.488 1.09-1.09 1.09a1.092 1.092 0 0 1-1.092-1.09c0-.602.49-1.09 1.091-1.09Zm4.363 0c.603 0 1.09.488 1.09 1.09 0 .602-.487 1.09-1.09 1.09a1.092 1.092 0 0 1-1.09-1.09c0-.602.488-1.09 1.09-1.09Z"/>
          <path d="M17.515 11.77c-1.917-.074-3.708.633-5.027 1.874-1.23 1.157-1.903 2.686-1.895 4.306.008 1.621.697 3.14 1.94 4.285 1.243 1.145 3.06 1.828 5.117 1.81.893-.008 1.753-.19 2.528-.526l1.825.91-.536-1.594c1.03-.947 1.64-2.219 1.648-3.604.015-2.58-1.643-4.835-4.046-5.996-.248-.12-.509-.22-.78-.3a6.36 6.36 0 0 0-.774-.165Zm-1.303 3.793c.4 0 .724.327.724.732 0 .405-.324.733-.724.733a.73.73 0 0 1-.725-.733c0-.405.325-.732.725-.732Zm3.624 0c.4 0 .725.327.725.732 0 .405-.324.733-.725.733a.73.73 0 0 1-.724-.733c0-.405.324-.732.724-.732Z"/>
        </svg>
      </button>
      <!-- Google -->
      <button class="social-btn" title="Google 登录" aria-label="Google 登录">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62Z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/>
        </svg>
      </button>
      <!-- Apple -->
      <button class="social-btn" title="Apple 登录" aria-label="Apple 登录">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01ZM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25Z"/>
        </svg>
      </button>
    </div>

    <p class="signup-prompt">
      还没有账户？<a href="#">立即注册</a>
    </p>
  </section>

</div>

<script>
(function() {
  const panel   = document.querySelector('.illustration-panel');
  const svg     = document.querySelector('.cat-svg');
  const usernameInput = document.getElementById('username');

  /* viewBox: -90 0 360 270 */
  const VB_W = 360, VB_H = 270;

  /* –– Eye definitions: { el, cx, cy, maxOff, curX, curY, tgtX, tgtY } –– */
  const eyes = [
    /* Orange character */
    { el: document.getElementById('orange-left-pupil'),  cx: -73, cy: 208, maxOff: 2.2, curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    { el: document.getElementById('orange-right-pupil'), cx: -57, cy: 208, maxOff: 2.2, curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    /* Purple character */
    { el: document.getElementById('purple-left-pupil'),  cx: -36, cy: 176.5, maxOff: 1.5, curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    { el: document.getElementById('purple-right-pupil'), cx: -24, cy: 176.5, maxOff: 1.5, curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    /* Black character */
    { el: document.getElementById('black-left-pupil'),   cx: -6,  cy: 214,   maxOff: 1.2, curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    { el: document.getElementById('black-right-pupil'),  cx: 3,   cy: 214,   maxOff: 1.2, curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    /* Cat */
    { el: document.getElementById('left-eye-pupil'),     cx: 127, cy: 162,   maxOff: 7,   curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
    { el: document.getElementById('right-eye-pupil'),    cx: 183, cy: 162,   maxOff: 7,   curX: 0, curY: 0, tgtX: 0, tgtY: 0 },
  ];

  let isPeeking = false;
  const LERP = 0.14;

  /* —— Login form —— */
  const loginForm = document.getElementById('login-form');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const uname = usernameInput.value.trim();
    const pwd   = document.getElementById('password').value.trim();

    if (!uname) {
      usernameInput.focus();
      return;
    }
    if (!pwd) {
      document.getElementById('password').focus();
      return;
    }

    /* Validate credentials: admin / 123456 */
    if (uname !== 'admin' || pwd !== '123456') {
      showLoginError('用户名或密码错误，请重试');
      return;
    }

    localStorage.setItem('car_user', JSON.stringify({ name: 'admin', role: '管理员', ts: Date.now() }));
    window.location.href = 'system.html';
  });

  function showLoginError(msg) {
    // Remove existing error
    const old = document.querySelector('.login-error');
    if (old) old.remove();

    const errorEl = document.createElement('div');
    errorEl.className = 'login-error';
    errorEl.textContent = msg;
    loginForm.insertBefore(errorEl, loginForm.querySelector('.btn-login'));

    // Shake the form
    loginForm.style.animation = 'none';
    loginForm.offsetHeight; // reflow
    loginForm.style.animation = 'shake 0.4s var(--ease-out-quart)';

    // Auto dismiss after 3s
    setTimeout(() => {
      if (errorEl.parentNode) errorEl.remove();
    }, 3000);
  }

  function tick() {
    for (const e of eyes) {
      e.curX += (e.tgtX - e.curX) * LERP;
      e.curY += (e.tgtY - e.curY) * LERP;
      e.el.setAttribute('transform', `translate(${e.curX.toFixed(2)}, ${e.curY.toFixed(2)})`);
    }
    requestAnimationFrame(tick);
  }

  function setAllTargets(mx, my) {
    for (const e of eyes) {
      const dx = mx - e.cx;
      const dy = my - e.cy;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d > 0.15) {
        const r = Math.min(d, e.maxOff) / d;
        e.tgtX = dx * r;
        e.tgtY = dy * r;
      }
    }
  }

  function handleMove(e) {
    if (isPeeking) return;
    const rect = svg.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;

    const scaleX = VB_W / rect.width;
    const scaleY = VB_H / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top)  * scaleY;

    setAllTargets(mx, my);
  }

  function handleLeave() {
    if (isPeeking) return;
    for (const e of eyes) { e.tgtX = e.tgtY = 0; }
  }

  /* — Peeking: triggered by username input focus — */
  usernameInput.addEventListener('focus', () => {
    isPeeking = true;
    panel.classList.add('peeking');
    for (const e of eyes) {
      e.tgtX = e.maxOff; e.tgtY = 0;
    }
  });

  usernameInput.addEventListener('blur', () => {
    isPeeking = false;
    panel.classList.remove('peeking');
  });

  panel.addEventListener('mousemove',  handleMove,  { passive: true });
  panel.addEventListener('mouseleave', handleLeave);

  tick();
})();
</script>
</body>
</html>
